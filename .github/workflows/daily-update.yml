name: Daily Tax News Update

on:
  schedule:
    - cron: '30 1 * * *'
  workflow_dispatch:

jobs:
  update-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install feedparser requests

      - name: Run auto-updater
        run: python updater.py

      - name: Commit and push if changed
        run: |
          git config --global user.email "taxexpress-bot@users.noreply.github.com"
          git config --global user.name "Tax Express Bot"
          git add news.json
          git diff --staged --quiet || (
            git commit -m "Auto-update: Tax news $(date '+%d %b %Y')" &&
            git push
          )

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: the-tax-express
          directory: .
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
