name: Tax News Auto-Update (Every 3 Hours)

on:
  schedule:
    # Offset from top-of-hour to avoid GitHub Actions congestion.
    # Runs at UTC: 02:47, 05:47, 08:47, 11:47, 14:47, 17:47, 20:47, 23:47
    # = IST:        8:17AM  11:17AM  2:17PM  5:17PM  8:17PM  11:17PM  2:17AM  5:17AM
    - cron: '47 2,5,8,11,14,17,20,23 * * *'
  workflow_dispatch:   # Allows manual trigger from GitHub dashboard

jobs:
  update-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # Needed to commit back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Full history so git pull works cleanly

      - name: Pull latest (avoid stale checkout conflicts)
        run: |
          git config --global user.email "taxexpress-bot@users.noreply.github.com"
          git config --global user.name "Tax Express Bot"
          git pull --rebase origin main || true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install feedparser requests openai

      - name: Run auto-updater
        run: python updater.py
        env:
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}

      - name: Commit and push news.json
        run: |
          git add news.json
          # Always commit — updater always writes updated timestamp
          git diff --staged --quiet && echo "No changes to commit" || (
            git commit -m "Auto-update: Tax news $(date -u '+%d %b %Y %H:%M UTC')" &&
            git push origin main
          )

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy . --project-name=the-tax-express --branch=main
