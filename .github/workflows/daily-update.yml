name: Tax News Auto-Update (Every 3 Hours)

on:
  schedule:
    # Runs every 3 hours: 5:30, 8:30, 11:30, 14:30, 17:30, 20:30, 23:30 IST
    - cron: '0 */3 * * *'
  workflow_dispatch:   # Allows manual trigger from GitHub dashboard

jobs:
  update-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # Needed to commit back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install feedparser requests

      - name: Run auto-updater
        run: python updater.py

      - name: Commit and push if news.json changed
        run: |
          git config --global user.email "taxexpress-bot@users.noreply.github.com"
          git config --global user.name "Tax Express Bot"
          git add news.json
          git diff --staged --quiet || (
            git commit -m "Auto-update: Tax news $(date '+%d %b %Y')" &&
            git push
          )

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy . --project-name=the-tax-express --branch=main
